<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HomeworkHub — Smart Learning Platform</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#F9F5EE;color:#1C1C1E;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#bbb;border-radius:3px}
@keyframes float1{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-18px) rotate(1deg)}}
@keyframes float2{0%,100%{transform:translateY(0) rotate(1deg)}50%{transform:translateY(-22px) rotate(-1.5deg)}}
@keyframes float3{0%,100%{transform:translateY(0) rotate(2deg)}50%{transform:translateY(-15px) rotate(-2deg)}}
@keyframes float4{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-20px) rotate(2deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(201,150,58,.4)}70%{box-shadow:0 0 0 15px rgba(201,150,58,0)}}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes spin{to{transform:rotate(360deg)}}
.landing-bg{min-height:100vh;background:linear-gradient(135deg,#0a1628,#0F2340 30%,#152d50 60%,#1a3a5c);background-size:200% 200%;animation:gradShift 15s ease infinite;position:relative;overflow:hidden}
.landing-bg::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 20% 80%,rgba(201,150,58,.08),transparent 50%),radial-gradient(circle at 80% 20%,rgba(59,109,193,.08),transparent 50%);pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:.15;pointer-events:none}
.orb1{width:400px;height:400px;background:#C9963A;top:-100px;right:-100px;animation:float1 8s ease-in-out infinite}
.orb2{width:300px;height:300px;background:#3B6DC1;bottom:-50px;left:-50px;animation:float2 10s ease-in-out infinite}
.orb3{width:200px;height:200px;background:#6B3FA0;top:40%;left:60%;animation:float3 12s ease-in-out infinite}
.lnav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:18px 40px;background:rgba(15,35,64,.4);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06)}
.llogo{display:flex;align-items:center;gap:12}
.llogo-i{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#C9963A,#E8B85A);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 20px rgba(201,150,58,.4)}
.lbtn{background:linear-gradient(135deg,#C9963A,#E8B85A);color:#fff;border:none;padding:12px 32px;border-radius:12px;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 4px 20px rgba(201,150,58,.3);transition:all .3s}
.lbtn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(201,150,58,.5)}
.hero{text-align:center;padding:160px 40px 60px;position:relative;z-index:1;animation:fadeUp 1s}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(36px,6vw,64px);line-height:1.15;margin-bottom:20px;background:linear-gradient(135deg,#fff,#E8B85A,#fff);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradShift 6s ease infinite}
.hero p{color:rgba(255,255,255,.65);font-size:clamp(16px,2vw,20px);max-width:600px;margin:0 auto 40px;line-height:1.6}
.hcta{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,#C9963A,#E8B85A);color:#fff;padding:16px 40px;border-radius:14px;font-weight:700;font-size:17px;cursor:pointer;border:none;box-shadow:0 8px 30px rgba(201,150,58,.35);transition:all .3s;animation:pulse 2s infinite;text-decoration:none}
.hcta:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(201,150,58,.5)}
.feats{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;padding:20px 40px 80px;max-width:1200px;margin:0 auto;position:relative;z-index:1}
.fc{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:36px 28px;backdrop-filter:blur(10px);transition:all .4s cubic-bezier(.175,.885,.32,1.275);cursor:default;position:relative;overflow:hidden}
.fc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--ac),transparent);opacity:0;transition:opacity .3s}
.fc:hover{transform:translateY(-8px);background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15);box-shadow:0 20px 60px rgba(0,0,0,.3)}
.fc:hover::before{opacity:1}
.fc:nth-child(1){animation:float1 6s ease-in-out infinite;--ac:#C9963A}
.fc:nth-child(2){animation:float2 7s ease-in-out infinite;animation-delay:.5s;--ac:#3B6DC1}
.fc:nth-child(3){animation:float3 8s ease-in-out infinite;animation-delay:1s;--ac:#2D7A4F}
.fc:nth-child(4){animation:float4 6.5s ease-in-out infinite;animation-delay:1.5s;--ac:#6B3FA0}
.i3d{width:72px;height:72px;border-radius:18px;margin-bottom:20px;display:flex;align-items:center;justify-content:center;font-size:34px;position:relative;transform:perspective(500px) rotateY(-8deg) rotateX(5deg);transition:transform .4s}
.fc:hover .i3d{transform:perspective(500px) rotateY(0) rotateX(0) scale(1.1)}
.i3d::after{content:'';position:absolute;bottom:-6px;left:10%;right:10%;height:10px;background:rgba(0,0,0,.2);border-radius:50%;filter:blur(6px)}
.ig{background:linear-gradient(135deg,#C9963A,#F5D98A);box-shadow:0 8px 25px rgba(201,150,58,.4),inset 0 -3px 6px rgba(0,0,0,.15),inset 0 3px 6px rgba(255,255,255,.3)}
.ib{background:linear-gradient(135deg,#2563EB,#60A5FA);box-shadow:0 8px 25px rgba(37,99,235,.4),inset 0 -3px 6px rgba(0,0,0,.15),inset 0 3px 6px rgba(255,255,255,.3)}
.igr{background:linear-gradient(135deg,#059669,#34D399);box-shadow:0 8px 25px rgba(5,150,105,.4),inset 0 -3px 6px rgba(0,0,0,.15),inset 0 3px 6px rgba(255,255,255,.3)}
.ip{background:linear-gradient(135deg,#7C3AED,#A78BFA);box-shadow:0 8px 25px rgba(124,58,237,.4),inset 0 -3px 6px rgba(0,0,0,.15),inset 0 3px 6px rgba(255,255,255,.3)}
.fc h3{color:#fff;font-family:'Playfair Display',serif;font-size:20px;margin-bottom:10px}
.fc p{color:rgba(255,255,255,.55);font-size:14px;line-height:1.7}
.stbar{display:flex;justify-content:center;gap:48px;padding:0 40px 50px;position:relative;z-index:1;flex-wrap:wrap}
.sti{text-align:center;animation:fadeUp 1s ease;animation-fill-mode:backwards}
.sti:nth-child(1){animation-delay:.2s}.sti:nth-child(2){animation-delay:.4s}.sti:nth-child(3){animation-delay:.6s}
.stn{font-family:'Playfair Display',serif;font-size:36px;color:#E8B85A}
.stl{font-size:14px;color:rgba(255,255,255,.45);margin-top:4px}
.lftr{border-top:1px solid rgba(255,255,255,.08);padding:30px 40px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1;flex-wrap:wrap;gap:16px}
.lftr-l{color:rgba(255,255,255,.4);font-size:13px}.lftr-l a{color:#E8B85A;text-decoration:none;font-weight:700}
.lftr-r{display:flex;gap:14px}
.fi{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);cursor:pointer;transition:all .3s;text-decoration:none}
.fi:hover{background:rgba(255,255,255,.12);transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.3)}
.spinner{width:32px;height:32px;border:3px solid rgba(201,150,58,.2);border-top-color:#C9963A;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
/* ═══ CINEMATIC SCROLL HERO ═══ */
.cin{position:relative;overflow:hidden;border-radius:20px;margin-bottom:28px;background:linear-gradient(135deg,#0a1628 0%,#0F2340 40%,#1a3a5c 100%);min-height:280px}
.cin-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:48px 24px;min-height:280px}
.cin h2{font-family:'Playfair Display',serif;font-size:clamp(24px,4vw,36px);color:#fff;margin-bottom:8px;opacity:0;transform:translateY(30px);transition:all .8s cubic-bezier(.16,1,.3,1)}
.cin p{color:rgba(255,255,255,.55);font-size:clamp(14px,1.8vw,17px);max-width:500px;opacity:0;transform:translateY(20px);transition:all .8s .15s cubic-bezier(.16,1,.3,1)}
.cin.vis h2,.cin.vis p{opacity:1;transform:translateY(0)}
.cin-item{position:absolute;font-size:clamp(28px,5vw,52px);opacity:.12;transition:transform .1s linear;pointer-events:none;filter:drop-shadow(0 4px 12px rgba(0,0,0,.3));will-change:transform}
.cin.vis .cin-item{opacity:.2;animation:cinFloat 6s ease-in-out infinite}
.cin-item:nth-child(1){top:12%;left:6%;animation-delay:0s}
.cin-item:nth-child(2){top:60%;left:10%;animation-delay:.8s}
.cin-item:nth-child(3){top:15%;right:8%;animation-delay:1.6s}
.cin-item:nth-child(4){top:65%;right:12%;animation-delay:.4s}
.cin-item:nth-child(5){top:35%;left:3%;animation-delay:1.2s}
.cin-item:nth-child(6){bottom:10%;left:30%;animation-delay:2s;font-size:clamp(22px,3.5vw,38px)}
.cin-item:nth-child(7){top:20%;right:25%;animation-delay:1.8s;font-size:clamp(22px,3.5vw,38px)}
.cin-item:nth-child(8){bottom:15%;right:5%;animation-delay:.6s;font-size:clamp(20px,3vw,34px)}
@keyframes cinFloat{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-12px) rotate(3deg)}50%{transform:translateY(-6px) rotate(-2deg)}75%{transform:translateY(-16px) rotate(1deg)}}
.cin-glow{position:absolute;border-radius:50%;filter:blur(50px);opacity:.12;pointer-events:none}
.cin-glow1{width:200px;height:200px;background:#C9963A;top:-40px;right:-40px;animation:float1 7s ease-in-out infinite}
.cin-glow2{width:160px;height:160px;background:#3B6DC1;bottom:-30px;left:-30px;animation:float2 9s ease-in-out infinite}
.cin-glow3{width:120px;height:120px;background:#6B3FA0;top:50%;left:50%;animation:float3 11s ease-in-out infinite}
.cin-line{position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#C9963A,#3B6DC1,#6B3FA0,transparent);opacity:.5}
.cin-stats{display:flex;gap:32px;margin-top:24px;opacity:0;transform:translateY(15px);transition:all .8s .3s cubic-bezier(.16,1,.3,1)}
.cin.vis .cin-stats{opacity:1;transform:translateY(0)}
.cin-stat{text-align:center}
.cin-stat-n{font-family:'Playfair Display',serif;font-size:22px;color:#E8B85A;font-weight:700}
.cin-stat-l{font-size:12px;color:rgba(255,255,255,.4);margin-top:2px}
@keyframes bob{0%,100%{transform:translateY(0) perspective(400px) rotateY(-5deg)}50%{transform:translateY(-4px) perspective(400px) rotateY(5deg)}}
@keyframes glow{0%,100%{filter:drop-shadow(0 2px 6px rgba(201,150,58,.3))}50%{filter:drop-shadow(0 4px 12px rgba(201,150,58,.5))}}
@keyframes drawTick{0%{stroke-dashoffset:30}100%{stroke-dashoffset:0}}
@keyframes pageTurn{0%{transform:scaleX(1) skewY(0)}30%{transform:scaleX(.7) skewY(-3deg)}60%{transform:scaleX(1.05) skewY(1deg)}}
@keyframes pageFlipR{0%,15%{transform:rotateY(0);opacity:.7}45%,55%{transform:rotateY(-90deg);opacity:.3}85%,100%{transform:rotateY(-180deg);opacity:0}}
@keyframes pageFlipShow{0%,45%{opacity:0}55%,100%{opacity:.6}}
@keyframes lineGrow{0%{stroke-dashoffset:40;opacity:0}50%{opacity:.5}100%{stroke-dashoffset:0;opacity:.4}}
@keyframes nodeGlow{0%,100%{r:2.5;opacity:.3}50%{r:3.5;opacity:.7}}
@keyframes badgePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes bookFloat{0%,100%{transform:translateY(0) perspective(600px) rotateX(5deg)}50%{transform:translateY(-3px) perspective(600px) rotateX(-2deg)}}
/* 3D Book pages */
.book3d{position:relative;transform-style:preserve-3d;perspective:600px}
.bpage{position:absolute;transform-origin:left center;backface-visibility:hidden;border-radius:0 4px 4px 0;background:linear-gradient(135deg,#e8dcc8,#f5edd8);box-shadow:1px 1px 4px rgba(0,0,0,.15)}
.bpage-back{position:absolute;transform-origin:left center;backface-visibility:hidden;border-radius:0 4px 4px 0;background:linear-gradient(135deg,#d4c9b0,#e0d5be);transform:rotateY(180deg)}
.bpage-l{position:absolute;transform-origin:right center;border-radius:4px 0 0 4px;background:linear-gradient(135deg,#f5edd8,#e8dcc8);box-shadow:-1px 1px 4px rgba(0,0,0,.1)}
@keyframes flip1{0%,10%{transform:rotateY(0)}40%,100%{transform:rotateY(-180deg)}}
@keyframes flip2{0%,30%{transform:rotateY(0)}60%,100%{transform:rotateY(-180deg)}}
@keyframes flip3{0%,50%{transform:rotateY(0)}80%,100%{transform:rotateY(-180deg)}}
@keyframes flipLoop1{0%,8%{transform:rotateY(0)}28%,52%{transform:rotateY(-180deg)}72%,100%{transform:rotateY(0)}}
@keyframes flipLoop2{0%,18%{transform:rotateY(0)}38%,62%{transform:rotateY(-180deg)}82%,100%{transform:rotateY(0)}}
@keyframes flipLoop3{0%,28%{transform:rotateY(0)}48%,72%{transform:rotateY(-180deg)}92%,100%{transform:rotateY(0)}}.ic3d{display:inline-flex;animation:bob 3s ease-in-out infinite,glow 3s ease-in-out infinite;font-size:inherit}
/* ═══ RESPONSIVE GRID CLASSES ═══ */
.g-side{display:grid;grid-template-columns:280px 1fr;gap:22px;align-items:start}
.g-main{display:grid;grid-template-columns:1fr 1.5fr;gap:20px;align-items:start}
.g-sub{display:grid;grid-template-columns:1fr 1.2fr;gap:20px;align-items:start}
.g-stat{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.g-act{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.g-card{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.g-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:768px){
  .cin{min-height:200px;border-radius:14px}.cin-inner{min-height:200px;padding:30px 16px}.cin-item{font-size:22px !important}.cin-stats{gap:16px;flex-wrap:wrap}
  .g-side,.g-main,.g-sub{grid-template-columns:1fr !important}
  .g-stat{grid-template-columns:repeat(2,1fr) !important}
  .g-act{grid-template-columns:1fr !important}
  .g-card{grid-template-columns:1fr !important}
  .g-3,.g-2{grid-template-columns:1fr !important}
  .lnav{padding:14px 16px}.hero{padding:120px 16px 40px}.feats{padding:16px 16px 60px;gap:14px}.fc{padding:24px 20px}.lftr{padding:20px 16px}.stbar{gap:24px}
  table{font-size:13px}table th,table td{padding:10px 12px !important}
}
/* ═══════════ ROCKET LAUNCH SEQUENCE ═══════════ */
.rl-overlay{position:fixed;inset:0;z-index:9999;overflow:hidden;background:#03050c;animation:rlOverlayIn .45s ease both,rlOverlayOut .7s ease 10s forwards}
@keyframes rlOverlayIn{from{opacity:0}to{opacity:1}}
@keyframes rlOverlayOut{from{opacity:1}to{opacity:0;visibility:hidden}}
.rl-sky{position:absolute;inset:0;background:linear-gradient(180deg,#03050c 0%,#081229 16%,#122c57 33%,#2d5a96 49%,#5d8cc4 61%,#9bb6d6 70%,#d7a978 80%,#f1bf86 89%,#ffe0ad 100%)}
.rl-space{position:absolute;inset:0;background:radial-gradient(ellipse 130% 95% at 50% 10%,rgba(3,5,12,0) 0%,#03050c 52%);opacity:0;animation:rlFadeIn 3s ease 1.2s forwards}
.rl-sun{position:absolute;left:50%;bottom:8%;width:160%;height:44%;transform:translateX(-50%);background:radial-gradient(ellipse at 50% 100%,rgba(255,202,124,.62),rgba(255,150,70,.18) 38%,transparent 66%);mix-blend-mode:screen;pointer-events:none}
.rl-haze{position:absolute;left:0;right:0;bottom:16%;height:15%;background:linear-gradient(180deg,transparent,rgba(255,214,160,.34),transparent);filter:blur(9px);pointer-events:none}
.rl-stars{position:absolute;inset:0;opacity:0;animation:rlFadeIn 2s ease 1.5s forwards;pointer-events:none}
@keyframes rlFadeIn{to{opacity:1}}
.rl-star{position:absolute;border-radius:50%;background:#fff;box-shadow:0 0 5px #fff;animation:rlTwinkle 2.8s ease-in-out infinite}
@keyframes rlTwinkle{0%,100%{opacity:.15}50%{opacity:1}}
.rl-ground{position:absolute;left:0;right:0;bottom:0;height:15%;background:linear-gradient(180deg,#16223e 0%,#0a1224 55%,#04060e 100%);box-shadow:0 -26px 80px rgba(0,0,0,.7)}
.rl-ground::before{content:"";position:absolute;left:0;right:0;top:0;height:3px;background:linear-gradient(90deg,transparent,rgba(255,160,80,.55),transparent)}
.rl-pad{position:absolute;left:50%;bottom:13%;width:240px;height:20px;transform:translateX(-50%);border-radius:50%;background:radial-gradient(ellipse,#3a455f,#141d33 70%,transparent);opacity:.95}
.rl-pad-glow{position:absolute;left:50%;bottom:8%;width:430px;height:175px;transform:translateX(-50%);background:radial-gradient(ellipse,rgba(255,172,62,.72),rgba(255,90,30,.2) 44%,transparent 72%);filter:blur(18px);opacity:0;animation:rlFadeIn .4s ease .55s forwards}
.rl-scene{position:absolute;inset:0;z-index:2;perspective:1300px;perspective-origin:50% 16%;transform-style:preserve-3d;animation:rlShake .085s linear .6s 22}
@keyframes rlShake{0%,100%{transform:translate(0,0)}20%{transform:translate(-2px,1px)}45%{transform:translate(2px,-1.5px)}70%{transform:translate(-1.5px,2px)}}
.rl-groundlift{animation:rlGroundLift 3.6s cubic-bezier(.5,0,.85,.3) 1.1s forwards}
@keyframes rlGroundLift{to{transform:translateY(74vh)}}
.rl-trail{position:absolute;left:50%;bottom:13%;width:32px;height:72vh;transform:translateX(-50%) scaleY(0);transform-origin:bottom center;background:linear-gradient(180deg,transparent,rgba(228,232,240,.04) 8%,rgba(228,232,240,.15) 38%,rgba(242,244,250,.3) 84%,rgba(255,206,150,.42));filter:blur(8px);border-radius:50% 50% 10px 10px;opacity:0;animation:rlTrail 3.4s ease-in 1s forwards}
@keyframes rlTrail{0%{opacity:0;transform:translateX(-50%) scaleY(0)}12%{opacity:.9}70%{opacity:.82}100%{opacity:0;transform:translateX(-50%) scaleY(1)}}
.rl-rocket-wrap{position:absolute;left:50%;bottom:13%;width:130px;transform:translateX(-50%);transform-origin:bottom center;transform-style:preserve-3d;animation:rlLift 5s cubic-bezier(.55,0,.78,.35) .55s forwards;will-change:transform,filter}
@keyframes rlLift{
0%{transform:translateX(-50%) translate3d(0,0,0) scale(1) rotateZ(0deg) rotateX(0deg);filter:blur(0)}
9%{transform:translateX(-50%) translate3d(0,-1.5vh,0) scale(1) rotateZ(0deg);filter:blur(0)}
14%{transform:translateX(-50%) translate3d(-1px,-4vh,0) scale(.99) rotateZ(-.8deg);filter:blur(.25px)}
30%{transform:translateX(-50%) translate3d(2px,-24vh,-50px) scale(.9) rotateZ(1deg) rotateX(3deg);filter:blur(.5px)}
55%{transform:translateX(-50%) translate3d(-2px,-66vh,-230px) scale(.62) rotateZ(-1.2deg) rotateX(7deg);filter:blur(1px)}
78%{transform:translateX(-50%) translate3d(1px,-112vh,-440px) scale(.4) rotateZ(.6deg) rotateX(10deg);filter:blur(1.7px)}
100%{transform:translateX(-50%) translate3d(0,-170vh,-720px) scale(.22) rotateZ(0deg) rotateX(13deg);filter:blur(2.6px);opacity:.85}
}
.rl-rocket{display:block;width:130px;height:auto;filter:drop-shadow(0 10px 26px rgba(0,0,0,.55))}
.rl-flame{position:absolute;left:50%;bottom:3px;width:58px;transform:translateX(-50%);transform-origin:top center;animation:rlIgnite .42s ease .55s both,rlBurst .8s ease-in-out 1s infinite}
@keyframes rlIgnite{0%{transform:translateX(-50%) scaleY(0);opacity:0}100%{transform:translateX(-50%) scaleY(1);opacity:1}}
@keyframes rlBurst{0%,100%{transform:translateX(-50%) scaleY(1)}50%{transform:translateX(-50%) scaleY(1.55)}}

const HW=`You are an expert, warm, and highly detailed English language teacher. Give thorough feedback with specific examples from the student's text. NO scores or numbers. Use EXACTLY this format:

📝 Grammatical Range & Accuracy
Analyse the student's grammar in detail. Quote specific sentences and explain what's correct and what could be improved. Cover tenses, articles, prepositions, subject-verb agreement, and sentence structure. Be encouraging.

💡 Suggestion: Give one specific, practical exercise or rule they should practise.

────────────────────────────────

🎯 Task Achievement
Assess how well the student addressed the task. Did they cover all parts? Is their response relevant and complete? Give specific examples of what they included or missed.

💡 Suggestion: Give one specific tip for better task coverage.

────────────────────────────────

🔗 Coherence & Cohesion
Evaluate the logical flow, paragraph structure, and use of linking words (however, moreover, in addition, etc.). Quote examples of good or weak connections between ideas.

💡 Suggestion: Recommend specific linking devices or structural improvements.

────────────────────────────────

📚 Lexical Resource
Comment on vocabulary range, accuracy, and sophistication. Point out good word choices and suggest alternatives for weak or repeated vocabulary. Be specific.

💡 Suggestion: Suggest 3-5 specific words or phrases they could use to improve.

────────────────────────────────

⭐ Overall Impression
Write a warm, genuine summary. Mention what they did best. End with sincere encouragement that motivates them to keep improving.`;

const SH=`You are a warm, sharp-eared native English speaker sitting beside the student, acting as their personal shadowing coach. You listened closely and you notice the SMALL things — a dropped ending, a flattened question, a rushed phrase, a swapped sound. Your job is to point those tiny things out kindly and clearly, the way a real tutor would, so the student knows EXACTLY what to fix next time.

HOW YOU WORK (read carefully):
- You are given the TARGET text, the student's TRANSCRIPTION (auto speech-to-text of what they said), and timing data (recording length + word counts).
- The transcription is auto-corrected to real words, so it hides some pronunciation. BUT when a target word comes out as a DIFFERENT real word, that swap is a clue to a real sound slip. Decode these like a detective:
  • "think→sink / three→tree" = the TH sound (tongue between teeth) became S or T.
  • "very→berry / vest→west" = V (top teeth on bottom lip) became B or W.
  • "light→right / play→pray" = L and R getting mixed.
  • "ship→sheep / bit→beat" = short vowel stretched too long.
  • "he→eat, dropped 'h'" = missing H at the start.
  • a missing final word-ending ("walked→walk", "cats→cat") = swallowed consonant endings.
  Name the exact words from BOTH texts and explain the mouth movement in plain words (no phonetic symbols, no IPA).
- For PACE/FLUENCY: use the timing data. Roughly, calm clear reading is a relaxed pace; cramming many words into few seconds = rushed; very few words over a long time = hesitant/choppy. Describe it in plain words ("you raced the second half", "lovely steady pace") — translate any numbers into feelings, never print raw numbers or scores.
- For INTONATION & STRESS: you can't hear their pitch, so MODEL it. Take 2-3 lines from the target and show how a native speaker rides the melody — CAPITALISE the stressed words and use ↗ for a rising voice and ↘ for a falling voice. This gives them a clear pattern to copy.
- If the transcription is empty or garbled, say so gently in one line, then still coach them fully using the target text as the model.

RULES:
- NO scores, grades, bands, percentages, or numbers of any kind.
- Catch small, specific things — not generic advice. Every point names actual words.
- Keep the writing SIMPLE and short. Plain everyday English. Friendly, like a person talking, not a textbook.
- Be honest and specific, but always encouraging. A real coach is kind AND precise.

Use EXACTLY this layout (keep each part short):

👂 What I heard
Two warm, honest sentences on your overall first impression — what landed well and the one biggest thing to tighten.

────────────────────────────────

🔊 Your sounds (pronunciation)
2-4 bullet points. Each names a real word from their attempt vs the target and gives a tiny, plain-English mouth tip. Praise the sounds they nailed too.

────────────────────────────────

🎵 The music (intonation & stress)
Re-write 2-3 target sentences showing the native melody: CAPITAL = stressed word, ↗ = voice up, ↘ = voice down. One simple line saying what their version likely flattened or over-stressed.

────────────────────────────────

🌊 Your flow (fluency & pace)
2-3 sentences in plain words about rhythm, pausing in the right places (chunking), and whether they rushed or hesitated — point to the exact phrase where it happened.

────────────────────────────────

✏️ Words to re-check
A short, specific list of words they missed, added, or changed — target word → what came out. Skip this part only if it was word-perfect (then say so and celebrate it).

────────────────────────────────

🎯 Try this one thing next time
ONE clear, doable action for their very next attempt (e.g. "slow down on the last sentence and land hard on the word HOME"). Make it concrete.

⭐ End with one or two genuinely warm lines that make them want to hit record again right now.`;

/* ═══ VIDEO PLAYER (URL + uploaded) ═══ */
function VP({url,videoData}){
  const[loading,setLoading]=useState(true);
  const src=videoData||url;
  if(!src?.trim())return null;
  const yt=src.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\s?]+)/);
  if(yt)return <div style={{position:"relative"}}>
    {loading&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,.8)",borderRadius:12,zIndex:1}}><div><div className="spinner"/><p style={{color:"rgba(255,255,255,.6)",fontSize:13,marginTop:10}}>Loading video…</p></div></div>}
    <div style={{borderRadius:12,overflow:"hidden",background:"#000",aspectRatio:"16/9"}}><iframe src={`https://www.youtube.com/embed/${yt[1]}?rel=0`} width="100%" height="100%" frameBorder="0" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowFullScreen style={{display:"block"}} onLoad={()=>setLoading(false)}/></div>
    <a href={url||src} target="_blank" rel="noreferrer" style={{fontSize:12,color:$.bl,fontWeight:600,marginTop:8,display:"inline-block"}}>🔗 Open link</a>
  </div>;
  return <div style={{position:"relative"}}>

    <video src={src} controls playsInline onLoadedData={()=>setLoading(false)} onCanPlay={()=>setLoading(false)} style={{width:"100%",borderRadius:12,maxHeight:420,background:"#000",display:"block"}}/>
    {url&&<a href={url} target="_blank" rel="noreferrer" style={{fontSize:12,color:$.bl,fontWeight:600,marginTop:8,display:"inline-block"}}>🔗 Open link</a>}
  </div>;
}

/* ═══ VIDEO UPLOAD (for teachers) ═══ */
function VideoUpload({videoUrl,setVideoUrl,videoData,setVideoData}){
  const ref=useRef();const[uploading,setUploading]=useState(false);const[mode,setMode]=useState(videoData?"file":"url");
  async function handleFile(e){
    const f=e.target.files?.[0];if(!f)return;
    if(f.size>50*1024*1024){alert("Video too large (max 50MB). Use a YouTube link for larger videos.");return;}
    setUploading(true);
    const reader=new FileReader();
    reader.onload=ev=>{setVideoData(ev.target.result);setVideoUrl("");setUploading(false);};
    reader.readAsDataURL(f);
  }
  return <div>
    <div style={{display:"flex",gap:8,marginBottom:10}}>
      <button onClick={()=>{setMode("url");setVideoData(null);}} style={{flex:1,padding:8,borderRadius:8,border:`2px solid ${mode==="url"?$.bl:$.b}`,background:mode==="url"?$.bb:$.c,cursor:"pointer",fontWeight:600,fontSize:13,color:mode==="url"?$.bl:$.m}}>🔗 Paste URL</button>
      <button onClick={()=>{setMode("file");setVideoUrl("");}} style={{flex:1,padding:8,borderRadius:8,border:`2px solid ${mode==="file"?$.pu:$.b}`,background:mode==="file"?$.pb:$.c,cursor:"pointer",fontWeight:600,fontSize:13,color:mode==="file"?$.pu:$.m}}>📁 Upload Video</button>
    </div>
    {mode==="url"&&<div><I value={videoUrl} onChange={v=>{setVideoUrl(v);setVideoData(null);}} placeholder="https://youtube.com/watch?v=... or direct video URL"/><p style={{fontSize:11,color:$.m,marginTop:4}}>YouTube links, Google Drive links, or any direct video URL</p></div>}
    {mode==="file"&&<div>
      <div onClick={()=>!uploading&&ref.current.click()} style={{border:`2px dashed ${$.pu}55`,borderRadius:12,padding:"20px 16px",textAlign:"center",background:$.pb,cursor:uploading?"wait":"pointer"}}>
        {uploading?<><div className="spinner"/><p style={{color:$.pu,fontSize:13,marginTop:8}}>Processing video…</p></>:videoData?<div><span style={{fontSize:28}}>✅</span><p style={{color:$.pu,fontSize:14,fontWeight:600,marginTop:6}}>Video uploaded!</p><p style={{color:$.m,fontSize:12}}>Click to replace</p></div>:<div><span style={{fontSize:28}}>📹</span><p style={{color:$.pu,fontSize:14,fontWeight:600,marginTop:6}}>Click to upload video</p><p style={{color:$.m,fontSize:12}}>MP4, WebM, MOV · Max 50MB</p></div>}
      </div>
      <input ref={ref} type="file" accept="video/*" style={{display:"none"}} onChange={handleFile}/>
    </div>}
    {(videoUrl?.trim()||videoData)&&<div style={{marginTop:12}}><Lb>Preview</Lb><VP url={videoUrl} videoData={videoData}/></div>}
  </div>;
}

/* ═══ VOICE RECORDER (multi-attempt) ═══ */
function blobToB64(blob){return new Promise(r=>{const rd=new FileReader();rd.onload=()=>r(rd.result);rd.readAsDataURL(blob);});}
const ordinal=n=>n===1?"1st":n===2?"2nd":n===3?"3rd":n+"th";

function VR({targetText,attemptKey,timeLimit,canDelete=true}){
  const[ph,sPh]=useState("idle"); // idle|rec|rev|load|saved
  const[attempts,setAttempts]=useState([]);const[loading,sLoading]=useState(true);
  const[au,sAu]=useState(null);const[auB64,sAuB64]=useState(null);
  const[sec,sSec]=useState(0);const[tr,sTr]=useState("");const[err,sErr]=useState("");
  const mr=useRef(null);const ch=useRef([]);const tm=useRef(null);const sr=useRef(null);const buf=useRef("");

  // Load attempts on mount
  useEffect(()=>{if(!attemptKey)return;(async()=>{const a=await loadAttempts(attemptKey);setAttempts(a);sLoading(false);})();},[attemptKey]);

  const totalSec=attempts.reduce((s,a)=>s+(a.duration||0),0);
  const reqSec=(timeLimit||0)*60;
  const met=reqSec>0&&totalSec>=reqSec;

  async function start(){
    sErr("");
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const rec=new MediaRecorder(stream);ch.current=[];
      rec.ondataavailable=e=>{if(e.data.size>0)ch.current.push(e.data);};
      rec.onstop=async()=>{const blob=new Blob(ch.current,{type:rec.mimeType||"audio/webm"});sAu(URL.createObjectURL(blob));try{const b64=await blobToB64(blob);sAuB64(b64);}catch{}stream.getTracks().forEach(t=>t.stop());};
      rec.start(200);mr.current=rec;buf.current="";sTr("");
      const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
      if(SR){try{const s=new SR();s.continuous=true;s.interimResults=false;s.lang="en-US";s.onresult=e=>{for(let i=e.resultIndex;i<e.results.length;i++)if(e.results[i].isFinal)buf.current+=e.results[i][0].transcript+" ";sTr(buf.current.trim());};s.onerror=()=>{};s.start();sr.current=s;}catch{}}
      sPh("rec");sSec(0);tm.current=setInterval(()=>sSec(s=>s+1),1000);
    }catch{sErr("Microphone blocked. Allow access and retry.");}
  }
  function stop(){try{mr.current?.stop();}catch{}try{sr.current?.stop();}catch{}clearInterval(tm.current);sPh("rev");}

  async function analyze(){
    sPh("load");sErr("");
    const spoken=tr.trim();
    const tWords=(targetText.trim().match(/\S+/g)||[]).length;
    const sWords=(spoken.match(/\S+/g)||[]).length;
    const dur=sec||0;
    const wpm=dur>0?Math.round(sWords/(dur/60)):0;
    const timing=`Recording length: ${dur} seconds (${fm(dur)}).
Target word count: ${tWords} words. Words the student actually produced: ${sWords} words.
Approx speaking pace: ${wpm} words per minute (for YOUR judgement only — describe it in plain words, never print the number).`;
    const prompt=`TARGET TEXT (what they were shadowing):\n"${targetText}"\n\nSTUDENT'S TRANSCRIPTION (attempt #${attempts.length+1}, auto speech-to-text):\n"${spoken||"(no transcription captured)"}"\n\nTIMING & FLUENCY DATA:\n${timing}\n\nNow give your meticulous, simple, native-speaker shadowing feedback in the exact layout you were told to use. Catch the small things.`;
    try{
      const fb=await ai(SH,prompt);
      const att={id:uid(),key:attemptKey,num:attempts.length+1,transcript:tr.trim(),feedback:fb,audioData:auB64||"",duration:sec,createdAt:new Date().toISOString()};
      await saveAttempt(att);
      setAttempts(prev=>[...prev,att]);
      sPh("saved");sAu(null);sAuB64(null);sTr("");sSec(0);
    }catch(e){sErr("Feedback failed: "+e.message);sPh("rev");}
  }

  async function delAtt(id){
    if(!window.confirm("Delete this attempt?"))return;
    await delAttempt(id);setAttempts(prev=>prev.filter(a=>a.id!==id));
  }

  function newRec(){sPh("idle");sAu(null);sAuB64(null);sTr("");sSec(0);sErr("");buf.current="";}

  if(loading)return <C style={{textAlign:"center",padding:32}}><div className="spinner"/><p style={{color:$.m,marginTop:10}}>Loading attempts…</p></C>;

  return <div style={{display:"flex",flexDirection:"column",gap:16}}>
    {err&&<div style={{background:$.db,color:$.d,borderRadius:12,padding:14,fontSize:14}}>{err}</div>}

    {/* Time requirement progress */}
    {reqSec>0&&<div style={{background:met?$.sb:$.bb,borderRadius:12,padding:14,border:`1px solid ${met?$.s+"33":$.bl+"33"}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <span style={{fontSize:13,fontWeight:700,color:met?$.s:$.bl}}>⏱ Practice Requirement: {timeLimit} min</span>
        <span style={{fontSize:13,fontWeight:700,color:met?$.s:$.a}}>{Math.floor(totalSec/60)}m {totalSec%60}s / {timeLimit}m</span>
      </div>
      <div style={{height:8,background:$.b,borderRadius:4,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${Math.min(100,totalSec/reqSec*100)}%`,background:met?`linear-gradient(90deg,${$.s},#34d399)`:`linear-gradient(90deg,${$.a},${$.al})`,borderRadius:4,transition:"width .4s"}}/>
      </div>
      {met&&<p style={{fontSize:12,color:$.s,marginTop:6,fontWeight:600}}>✅ Requirement met! Great practice!</p>}
    </div>}

    {/* Recording controls */}
    {(ph==="idle"||ph==="saved")&&<C style={{textAlign:"center",padding:28,background:`linear-gradient(135deg,${$.c},#faf8f4)`}}>
      <div style={{fontSize:50,marginBottom:10}}>🎙️</div>
      <B v="danger" onClick={start} style={{fontSize:16,padding:"14px 32px",borderRadius:50,boxShadow:"0 6px 24px rgba(192,57,43,.3)"}}>🎙️ {attempts.length>0?`Record Attempt #${attempts.length+1}`:"Start Recording"}</B>
      <p style={{color:$.m,fontSize:13,margin:"14px 0 0"}}>Play the video, press Record, speak the target text.</p>
    </C>}

    {ph==="rec"&&<C style={{textAlign:"center",padding:28,background:`linear-gradient(135deg,${$.c},#faf8f4)`}}>
      <div style={{fontSize:50,marginBottom:8}}>🔴</div>
      <div style={{fontSize:34,fontWeight:800,color:$.d,fontFamily:"monospace",marginBottom:12}}>{fm(sec)}</div>
      <B v="ghost" onClick={stop} style={{fontSize:16,padding:"14px 32px",borderRadius:50}}>⏹ Stop Recording</B>
      <p style={{color:$.d,fontSize:14,margin:"12px 0 0",fontWeight:600}}>🎤 Recording… speak clearly!</p>
    </C>}

    {ph==="rev"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
      <C style={{padding:16,background:`linear-gradient(135deg,#f0fdf4,${$.sb})`}}><Lb>🔊 Listen Back ({fm(sec)})</Lb><audio controls src={au} style={{width:"100%",marginTop:6}}/></C>
      {tr&&<C style={{padding:16}}><Lb>📝 Detected Speech</Lb><p style={{fontSize:14,color:$.i,margin:"6px 0 0",fontStyle:"italic",background:$.bg,padding:12,borderRadius:10,border:`1px solid ${$.b}`}}>{tr}</p></C>}
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}><B v="teal" onClick={analyze}>🤖 Save & Get Feedback</B><B v="ghost" s onClick={newRec}>↺ Discard & Re-record</B></div>
    </div>}

    {ph==="load"&&<C style={{textAlign:"center",padding:36}}><div className="spinner" style={{marginBottom:14}}/><p style={{color:$.m,fontSize:15,fontWeight:600}}>Analysing attempt #{attempts.length+1}…</p><p style={{color:$.m,fontSize:13,marginTop:4}}>10-20 seconds. Please wait.</p></C>}

    {/* Attempts list */}
    {attempts.length>0&&<div>
      <h3 style={{fontFamily:fd,fontSize:17,color:$.p,marginBottom:12}}>📋 Your Attempts ({attempts.length})</h3>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {attempts.map(att=><AttemptCard key={att.id} att={att} canDelete={canDelete} onDelete={()=>delAtt(att.id)}/>)}
      </div>
    </div>}
  </div>;
}

function AttemptCard({att,canDelete,onDelete}){
  const[open,setOpen]=useState(false);
  return <C style={{padding:0,overflow:"hidden",borderLeft:`4px solid ${att.feedback?$.s:$.a}`}}>
    <div onClick={()=>setOpen(!open)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 18px",cursor:"pointer",background:open?$.bg:$.c}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:18}}>{att.feedback?"✅":"⏳"}</span>
        <div><div style={{fontWeight:700,fontSize:14,color:$.i}}>{ordinal(att.num)} Attempt</div><div style={{fontSize:12,color:$.m}}>{fm(att.duration||0)} · {fD(att.createdAt)}</div></div>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        {canDelete&&<button onClick={e=>{e.stopPropagation();onDelete();}} style={{background:$.db,border:"none",color:$.d,borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:12,fontWeight:700}}>🗑</button>}
        <span style={{color:$.m,fontSize:14}}>{open?"▲":"▼"}</span>
      </div>
    </div>
    {open&&<div style={{padding:"0 18px 18px",display:"flex",flexDirection:"column",gap:12}}>
      {att.audioData&&<div><Lb>🔊 Recording</Lb><audio controls src={att.audioData} style={{width:"100%",marginTop:4}}/></div>}
      {att.transcript&&<div><Lb>📝 Transcript</Lb><p style={{fontSize:14,color:$.i,margin:"4px 0 0",fontStyle:"italic",background:$.bg,padding:12,borderRadius:10,border:`1px solid ${$.b}`,lineHeight:1.7}}>{att.transcript}</p></div>}
      {att.feedback&&<div><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><span style={{fontSize:20}}>🤖</span><span style={{fontWeight:700,color:$.s,fontSize:14}}>AI Feedback</span></div><FB text={att.feedback}/></div>}
    </div>}
  </C>;
}

function CinHero({role,name,stats}){

    {/* nose cone */}

    <path d="M97 22 Q92 44 88 96 Q94 93 100 93 Q97 60 100 22 Z" fill="#ffffff" opacity=".3"/>

function FlameSVG(){return(
  <svg viewBox="0 0 100 300" width="100%" height="auto" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="rlPlO" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor="#ffd27a"/><stop offset=".35" stopColor="#ff8a2b"/><stop offset=".7" stopColor="#f0501e"/><stop offset="1" stopColor="#c2330f" stopOpacity="0"/></linearGradient>
      <linearGradient id="rlPlM" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor="#fff4d2"/><stop offset=".4" stopColor="#ffce5c"/><stop offset=".85" stopColor="#ff8a2b" stopOpacity="0"/></linearGradient>
      <linearGradient id="rlPlI" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor="#ffffff"/><stop offset=".5" stopColor="#fff0c2"/><stop offset="1" stopColor="#ffce5c" stopOpacity="0"/></linearGradient>
      <linearGradient id="rlCore" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor="#eaf6ff"/><stop offset=".4" stopColor="#bfe0ff"/><stop offset="1" stopColor="#8fc4ff" stopOpacity="0"/></linearGradient>
    </defs>
    {/* outer plume (long, translucent) */}
    <path d="M50 0 Q82 80 66 196 Q58 268 50 298 Q42 268 34 196 Q18 80 50 0 Z" fill="url(#rlPlO)" opacity=".92"/>
    {/* mid plume */}
    <path d="M50 6 Q72 76 60 168 Q55 224 50 250 Q45 224 40 168 Q28 76 50 6 Z" fill="url(#rlPlM)"/>
    {/* inner plume */}
    <path d="M50 10 Q63 70 56 138 Q53 178 50 196 Q47 178 44 138 Q37 70 50 10 Z" fill="url(#rlPlI)"/>
    {/* hot white-blue core near the throat */}
    <path d="M50 2 Q60 44 55 104 Q52 138 50 150 Q48 138 45 104 Q40 44 50 2 Z" fill="url(#rlCore)"/>
    {/* Mach diamonds (shock structure) */}
    <ellipse cx="50" cy="34" rx="9" ry="6" fill="#fffbe9" opacity=".85"/>
    <ellipse cx="50" cy="62" rx="7" ry="5" fill="#fff3cf" opacity=".75"/>
    <ellipse cx="50" cy="92" rx="5.5" ry="4" fill="#ffe9b5" opacity=".6"/>
    <ellipse cx="50" cy="120" rx="4" ry="3" fill="#ffdf9c" opacity=".45"/>
  </svg>);
}

/* ═══ ROCKET LAUNCH ANIMATION SCREEN ═══ */
function RocketLaunch({onComplete}){
  const QUOTES=[
    {q:"The limits of my language are the limits of my world.",a:"Ludwig Wittgenstein",i:"\uD83C\uDF0D"},
    {q:"A different language is a different vision of life.",a:"Federico Fellini",i:"\uD83D\uDC41\uFE0F"},
    {q:"To have another tongue is to possess a second soul.",a:"Charlemagne",i:"\uD83D\uDDE3\uFE0F"},
    {q:"One language sets you in a corridor. Two open every door.",a:"Frank Smith",i:"\uD83D\uDEAA"},
    {q:"He who knows no foreign tongue knows nothing of his own.",a:"Goethe",i:"\uD83D\uDCD6"},
    {q:"Change your language and you change your thoughts.",a:"Karl Albrecht",i:"\uD83D\uDCAD"},
    {q:"You live a new life for every language you speak.",a:"Czech Proverb",i:"\u2728"},
    {q:"Language is the road map of a culture.",a:"Rita Mae Brown",i:"\uD83D\uDDFA\uFE0F"},
    {q:"Language is the dress of thought.",a:"Samuel Johnson",i:"\uD83D\uDC54"},
    {q:"Learning never exhausts the mind.",a:"Leonardo da Vinci",i:"\uD83E\uDDE0"},
    {q:"Reading is to the mind what exercise is to the body.",a:"Joseph Addison",i:"\uD83D\uDCDA"},
    {q:"The beautiful thing about learning is no one can take it from you.",a:"B.B. King",i:"\uD83C\uDF93"},
    {q:"Practice makes progress.",a:null,i:"\u270F\uFE0F"},
    {q:"Every new word is a new window on the world.",a:null,i:"\uD83E\uDE9F"}
  ];
  const stars=useRef(Array.from({length:72},()=>({l:(Math.random()*100).toFixed(2),t:(Math.random()*74).toFixed(2),d:(Math.random()*2.8).toFixed(2),s:(Math.random()*1.6+1).toFixed(1)})));
  const sparks=useRef(Array.from({length:14},()=>({dl:(1+Math.random()*.7).toFixed(2),sx:Math.round(Math.random()*52-26)})));
  const smoke=useRef(Array.from({length:11},(_,i)=>({l:(50+(i-5)*7.5).toFixed(1),dl:(.55+i*.09).toFixed(2),sw:Math.round(78+Math.random()*70),sdx:Math.round((i-5)*18+(Math.random()*30-15)),sdy:Math.round(-30-Math.random()*45),ss:(2.8+Math.random()*1.6).toFixed(2)})));
  const quotes=useRef(QUOTES.map((Q,i)=>({...Q,l:(Math.random()*70+3).toFixed(2),dl:(3.4+Math.random()*1.8).toFixed(2),du:(6.2+Math.random()*2).toFixed(2),sz:Math.round(13+Math.random()*3),rot:(Math.random()<.5?-1:1)*Math.round(4+Math.random()*8)})));
  useEffect(()=>{const t=setTimeout(()=>onComplete&&onComplete(),10700);return()=>clearTimeout(t);},[onComplete]);
  return <div className="rl-overlay" role="img" aria-label="Rocket launch animation">
    <div className="rl-sky"/>
    <div className="rl-space"/>
    <div className="rl-stars">{stars.current.map((s,i)=><span key={i} className="rl-star" style={{left:s.l+"%",top:s.t+"%",width:s.s+"px",height:s.s+"px",animationDelay:s.d+"s"}}/>)}</div>
    <div className="rl-scene">
      <div className="rl-sun rl-groundlift"/>
      <div className="rl-haze rl-groundlift"/>
      <div className="rl-ground rl-groundlift"/>
      <div className="rl-pad rl-groundlift"/>
      <div className="rl-pad-glow rl-groundlift"/>
    </div>
    <div className="rl-smoke-wrap">{smoke.current.map((s,i)=><span key={i} className="rl-smoke" style={{left:s.l+"%",animationDelay:s.dl+"s","--sw":s.sw+"px","--sdx":s.sdx+"px","--sdy":s.sdy+"px","--ss":s.ss}}/>)}</div>
    <div className="rl-scene">
      <div className="rl-trail"/>
      <div className="rl-rocket-wrap">
        <RocketSVG/>
        <div className="rl-flame-glow"/>
        <div className="rl-flame"><div className="rl-flame-flick"><FlameSVG/></div></div>
        {sparks.current.map((s,i)=><span key={i} className="rl-spark" style={{animationDelay:s.dl+"s","--sx":s.sx+"px"}}/>)}
      </div>
    </div>
    <div className="rl-clouds">
      <div className="rl-cloud rl-cloud1"><span className="rl-cloud-q">Believe you can and you're halfway there.<span className="ca">— Theodore Roosevelt</span></span></div>
      <div className="rl-cloud rl-cloud2"><span className="rl-cloud-q">Dream big, work hard, reach higher.</span></div>
      <div className="rl-cloud rl-cloud3"><span className="rl-cloud-q">Your only limit is your mind.</span></div>
      <div className="rl-cloud rl-cloud4"><span className="rl-cloud-q">Shoot for the moon — even if you miss, you'll land among the stars.<span className="ca">— Les Brown</span></span></div>
      <div className="rl-cloud rl-cloud5"><span className="rl-cloud-q">Stars can't shine without darkness.</span></div>
      <div className="rl-cloud rl-cloud6"><span className="rl-cloud-q">Great things never come from comfort zones.</span></div>
    </div>
    <div className="rl-vignette"/>
    <div className="rl-quotes">{quotes.current.map((t,i)=><span key={i} className="rl-quote" style={{left:t.l+"%",fontSize:t.sz+"px",animationDelay:t.dl+"s",animationDuration:t.du+"s","--rot":t.rot+"deg"}}><span className="qq"><span className="qi">{t.i}</span>{t.q}</span>{t.a&&<span className="qa">— {t.a}</span>}</span>)}</div>
    <div className="rl-status">
      <span className="rl-msg" style={{animationDelay:".55s",animationDuration:".95s"}}>IGNITION SEQUENCE</span>
      <span className="rl-msg" style={{animationDelay:"1.45s",animationDuration:"1.2s"}}>🚀 LIFTOFF</span>
      <span className="rl-msg" style={{animationDelay:"2.7s",animationDuration:"1.5s"}}>PASSING THROUGH THE CLOUDS</span>
      <span className="rl-msg" style={{animationDelay:"4.3s",animationDuration:"2.5s"}}>KNOWLEDGE IS RAINING DOWN ✦</span>
    </div>
    <button className="rl-skip" onClick={()=>onComplete&&onComplete()}>Skip →</button>
  </div>;
}

/* ═══ ROOT ═══ */
function App(){
  const[users,sU]=useState(null);const[classes,sC]=useState(null);const[assigns,sA]=useState(null);const[subs,sS]=useState(null);
  const[cur,sCur]=useState(null);const[dw,sDw]=useState(false);const[loading,sLoading]=useState(false);const[loadErr,sLoadErr]=useState("");
  const[fbUid,sFbUid]=useState(null);const[authReady,sAuthReady]=useState(false);
  const[page,sPage]=useState("landing");
  const[aN,sAN]=useState({v:"dashboard"});const[sN,sSN]=useState({v:"list",t:"assignments"});
  useEffect(()=>auth.onAuthStateChanged(fb=>{sAuthReady(true);if(fb){sFbUid(fb.uid);}else{sFbUid(null);sCur(null);sU(null);sC(null);sA(null);sS(null);sPage("landing");}}),[]);
  useEffect(()=>{if(!fbUid)return;let cancel=false;sLoading(true);sLoadErr("");(async()=>{try{const u=await dbL("users",[]);const c=await dbL("classes",[]);const a=await dbL("assignments",[]);const s=await dbL("submissions",[]);if(cancel)return;sU(u);sC(c);sA(a);sS(s);const me=u.find(x=>x.id===fbUid);if(me){sCur(me);sPage("app");}else{sLoadErr("Your account isn't fully set up yet. Please contact your teacher.");}}catch(e){if(!cancel)sLoadErr(e.message||"Connection error");}finally{if(!cancel)sLoading(false);}})();return()=>{cancel=true;};},[fbUid]);
  const setU=useCallback(async u=>{sU(u);await dbS("users",u);},[]);const setC=useCallback(async c=>{sC(c);await dbS("classes",c);},[]);const setA=useCallback(async a=>{sA(a);await dbS("assignments",a);},[]);const setS=useCallback(async s=>{sS(s);await dbS("submissions",s);},[]);
  async function uPh(id,ph){const u=users.map(x=>x.id===id?{...x,profilePhoto:ph}:x);await setU(u);if(cur?.id===id)sCur(p=>({...p,profilePhoto:ph}));}
  function logout(){auth.signOut();sCur(null);sAN({v:"dashboard"});sSN({v:"list",t:"assignments"});sDw(false);sPage("landing");}
  if(!authReady)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0F2340"}}><div className="spinner"/></div>;
  if(!fbUid){
    if(page==="launch")return <RocketLaunch onComplete={()=>sPage("login")}/>;
    if(page==="login")return <LoginForm onBack={()=>sPage("landing")}/>;
    return <Landing onLogin={()=>sPage("login")} onGetStarted={()=>sPage("launch")}/>;
  }
  if(loading||!cur)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0F2340"}}><div style={{textAlign:"center"}}><div className="spinner" style={{marginBottom:14}}/><p style={{color:"rgba(255,255,255,.5)",fontSize:15}}>Loading HomeworkHub…</p>{loadErr&&<p style={{color:"#FF8A80",fontSize:13,marginTop:10}}>⚠ {loadErr}</p>}<button onClick={()=>auth.signOut()} style={{marginTop:20,background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.2)",color:"#fff",padding:"8px 20px",borderRadius:10,cursor:"pointer",fontSize:13}}>Log out</button></div></div>;

  if(cur.role==="super_admin"){const tCount=(users||[SA0]).filter(u=>u.role==="teacher").length;const sCount=(users||[SA0]).filter(u=>u.role==="student").length;return <div style={{minHeight:"100vh",background:$.bg}}><Dr open={dw} onClose={()=>sDw(false)} tab="admin" setTab={()=>{}} items={[{id:"admin",label:"Management",icon:"👨‍🏫"}]} onLogout={logout} user={cur}/><NB user={cur} onLogout={logout} onHam={()=>sDw(o=>!o)} open={dw} label="Super Admin"/><div style={{maxWidth:1200,margin:"0 auto",padding:"24px 22px"}}><CinHero role="super_admin" name={cur.name} stats={[{v:tCount,l:"Teachers"},{v:sCount,l:"Students"}]}/><div style={{display:"flex",justifyContent:"flex-end",marginBottom:18}}><B v="logout" onClick={logout} style={{gap:8}}>⏏ Log Out</B></div></div><Admin users={users||[SA0]} setUsers={setU}/></div>;}

  if(cur.role==="teacher"){const tid=cur.id;const menu=[{id:"dashboard",label:"Dashboard",icon:"🏠"},{id:"daily",label:"Daily Assignments",icon:"📅"},{id:"classes",label:"My Classes",icon:"🏫"},{id:"studentinfo",label:"Student Logins",icon:"🔑"},{id:"submissions",label:"Submissions",icon:"📬"},{id:"settings",label:"Settings",icon:"⚙️"}];const curL=aN.v==="daypage"?`📅 ${fDy(aN.dk)}`:menu.find(m=>m.id===aN.v)?.label||"";const _u=users||[],_c=classes||[],_a=assigns||[],_s=subs||[];const goBack=()=>sAN({v:"dashboard"});const goNav=id=>sAN({v:id});const BackB=()=><button onClick={goBack} style={{background:"none",border:"none",color:$.bl,fontWeight:700,cursor:"pointer",marginBottom:16,fontSize:14,display:"flex",alignItems:"center",gap:6,padding:0}}>← Back</button>;return <div style={{minHeight:"100vh",background:$.bg}}><Dr open={dw} onClose={()=>sDw(false)} tab={aN.v==="daypage"?"daily":aN.v} setTab={goNav} items={menu} onLogout={logout} user={cur}/><NB user={cur} onLogout={logout} onHam={()=>sDw(o=>!o)} open={dw} label={curL}/><div style={{maxWidth:1200,margin:"0 auto",padding:"24px 22px"}}><div style={{display:"flex",justifyContent:"flex-end",marginBottom:18}}><B v="logout" onClick={logout} style={{gap:8}}>⏏ Log Out</B></div>{aN.v==="dashboard"&&<TD tid={tid} users={_u} classes={_c} assigns={_a} subs={_s} onNav={goNav}/>}{aN.v==="daily"&&<div><BackB/><TDL tid={tid} assigns={_a} onOpen={dk=>sAN({v:"daypage",dk})}/></div>}{aN.v==="daypage"&&<TDP dateKey={aN.dk} tid={tid} assigns={_a} setAssigns={setA} subs={_s} users={_u} classes={_c} onBack={()=>sAN({v:"daily"})}/>}{aN.v==="classes"&&<div><BackB/><TC tid={tid} users={_u} setUsers={setU} classes={_c} setClasses={setC}/></div>}{aN.v==="studentinfo"&&<TI tid={tid} users={_u} classes={_c} onNav={goNav} onBack={goBack}/>}{aN.v==="submissions"&&<div><BackB/><TS tid={tid} subs={_s} users={_u} assigns={_a} classes={_c}/></div>}{aN.v==="settings"&&<div><BackB/><Sett user={cur} onPhoto={p=>uPh(cur.id,p)}/></div>}</div></div>;}

  const sMn=[{id:"assignments",label:"Assignments",icon:"📋"},{id:"mywork",label:"My Submissions",icon:"📤"},{id:"settings",label:"Settings",icon:"⚙️"}];const myA=(assigns||[]).filter(a=>a.teacherId===cur.teacherId);const myS=(subs||[]).filter(s=>s.studentId===cur.id);const nL=sN.v==="assignment"?(assigns||[]).find(a=>a.id===sN.aId)?.title:"";
  const stuAssignCount=myA.length;const stuDoneCount=myS.filter(s=>s.feedback).length;
  return <div style={{minHeight:"100vh",background:$.bg}}><Dr open={dw} onClose={()=>sDw(false)} tab={sN.t} setTab={t=>sSN({v:"list",t})} items={sMn} onLogout={logout} user={cur}/><NB user={cur} onLogout={logout} onHam={()=>sDw(o=>!o)} open={dw} label={nL}/><div style={{maxWidth:960,margin:"0 auto",padding:"24px 22px"}}><CinHero role="student" name={cur.name} stats={[{v:stuAssignCount,l:"Assignments"},{v:stuDoneCount,l:"Completed"},{v:stuAssignCount-stuDoneCount,l:"Remaining"}]}/><div style={{display:"flex",justifyContent:"flex-end",marginBottom:18}}><B v="logout" onClick={logout} style={{gap:8}}>⏏ Log Out</B></div>
  {sN.v==="assignment"&&(()=>{const a=(assigns||[]).find(x=>x.id===sN.aId);if(!a)return <p style={{color:$.d}}>Assignment not found.</p>;return <SP assignment={a} user={cur} subs={subs||[]} setSubs={setS} onBack={()=>sSN({v:"list",t:"assignments"})}/>;})()}
  {sN.v==="list"&&sN.t==="assignments"&&<SL user={cur} assigns={myA} subs={myS} onOpen={id=>sSN({v:"assignment",aId:id,t:"assignments"})}/>}
  {sN.v==="list"&&sN.t==="mywork"&&<SM user={cur} subs={myS} assigns={myA} onOpen={id=>sSN({v:"assignment",aId:id,t:"mywork"})}/>}
  {sN.v==="list"&&sN.t==="settings"&&<Sett user={cur} onPhoto={p=>uPh(cur.id,p)}/>}
  </div></div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
