📝 Grammatical Range & Accuracy
Analyse the student's grammar in detail. Quote specific sentences and explain what's correct and what could be improved. Cover tenses, articles, prepositions, subject-verb agreement, and sentence structure. Be encouraging.

💡 Suggestion: Give one specific, practical exercise or rule they should practise.

────────────────────────────────

🔗 Coherence & Cohesion

────────────────────────────────

📚 Lexical Resource

- Which words were different, missed, or added
- Any word substitutions that suggest the student heard something different

- Whether the speech seems to flow naturally or feels choppy

- Any words that were transcribed differently from the target (this often indicates pronunciation differences)

⭐ Overall Impression
Write a genuinely warm and encouraging summary. Celebrate specific things they did well. Acknowledge the effort of practising shadowing. End with motivation that makes them want to try again immediately.`;

/* ═══ TEACHER: CLASSES ═══ */

function TC({tid,users,setUsers,classes,setClasses}){const[cn,sCn]=useState("");const[cm,sCm]=useState("");const[sel,sSel]=useState(null);const[sn,sSn]=useState("");const[su,sSu]=useState("");const[sp,sSp]=useState("");const[sm,sSm]=useState("");const mc=classes.filter(c=>c.teacherId===tid),ms=users.filter(u=>u.teacherId===tid&&u.role==="student");async function ac(){if(!cn){sCm("Enter name.");return;}await setClasses([...classes,{id:uid(),name:cn,teacherId:tid,color:CC[mc.length%CC.length]}]);sCn("");sCm("✓ Created!");}async function dc(id){await setClasses(classes.filter(c=>c.id!==id));await setUsers(users.map(u=>u.classId===id?{...u,classId:null}:u));if(sel===id)sSel(null);}async function as(){if(!sn||!su||!sp){sSm("Fill all.");return;}if(!sel){sSm("Pick class.");return;}if(users.find(u=>u.username===su)){sSm("Taken.");return;}await setUsers([...users,{id:uid(),username:su,password:sp,role:"student",name:sn,teacherId:tid,classId:sel,profilePhoto:null}]);sSn("");sSu("");sSp("");sSm("✓ Added!");}async function ds(id){if(!window.confirm("Remove?"))return;await setUsers(users.filter(u=>u.id!==id));}const sc=sel?mc.find(c=>c.id===sel):null,cs=sel?ms.filter(u=>u.classId===sel):[];

  </div><div>{!sc?<C style={{textAlign:"center",padding:56}}><span style={{fontSize:40}}>🏫</span><p style={{color:$.m,marginTop:14,fontSize:15}}>Select a class to manage its students.</p></C>:<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <C style={{padding:20,borderLeft:`4px solid ${sc.color}`}}><h3 style={{fontFamily:fd,fontSize:17,marginBottom:14,color:$.p}}>Add Student to {sc.name}</h3><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}><div><Lb>Name</Lb><I value={sn} onChange={sSn}/></div><div><Lb>Username</Lb><I value={su} onChange={sSu}/></div><div><Lb>Password</Lb><PwI value={sp} onChange={sSp}/></div></div><Ms t={sm}/><B v="primary" onClick={as} style={{marginTop:10}}>+ Add Student</B></C>

/* ═══ TEACHER: DAILY LIST ═══ */
function TDL({tid,assigns,onOpen}){const daily=assigns.filter(a=>a.teacherId===tid&&a.daily);const grp={};daily.forEach(a=>{const k=a.dueDate;if(!grp[k])grp[k]=[];grp[k].push(a);});const dates=Object.keys(grp).sort((a,b)=>new Date(b)-new Date(a));return <div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}><h2 style={{fontFamily:fd,fontSize:20,color:$.p,margin:0}}>Daily Assignments</h2><B v="teal" onClick={()=>onOpen(td())}>📅 Open Today</B></div>{dates.length===0?<C style={{textAlign:"center",padding:56}}><div style={{fontSize:48,marginBottom:12}}>📅</div><p style={{color:$.m,fontSize:16}}>No daily assignments yet.</p></C>:dates.map(dk=><div key={dk} onClick={()=>onOpen(dk)} style={{background:$.c,borderRadius:14,border:`1.5px solid ${$.b}`,padding:"16px 20px",marginBottom:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",transition:"all .2s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=$.t;e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow=`0 6px 20px ${$.t}15`;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=$.b;e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="";}}><div style={{display:"flex",alignItems:"center",gap:14}}><div style={{width:48,height:48,borderRadius:12,background:dk===td()?`linear-gradient(135deg,${$.t},#12b5cb)`:`linear-gradient(135deg,${$.p},#1a3a5c)`,color:"#fff",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 12px rgba(0,0,0,.15)"}}><div style={{fontSize:18,fontWeight:800,lineHeight:1}}>{new Date(dk).getDate()}</div><div style={{fontSize:9,opacity:.8,textTransform:"uppercase"}}>{new Date(dk).toLocaleDateString("en-GB",{month:"short"})}</div></div><div><div style={{fontWeight:700,fontSize:15,color:$.i}}>{fDy(dk)} {dk===td()&&<Bg label="Today" color={$.t}/>}</div><div style={{fontSize:13,color:$.m,marginTop:3}}>{grp[dk].length} assignment{grp[dk].length!==1?"s":""}</div></div></div><span style={{color:$.m,fontSize:18}}>→</span></div>)}</div>;}

/* ═══ TEACHER: DAY PAGE ═══ */
function TDP({dateKey,tid,assigns,setAssigns,subs,users,classes,onBack}){

  const[msg,sMsg]=useState("");const[busy,sBusy]=useState(false);const[selId,sSelId]=useState(null);
  const mc=classes.filter(c=>c.teacherId===tid),stAll=users.filter(u=>u.teacherId===tid&&u.role==="student");
  const dayA=assigns.filter(a=>a.teacherId===tid&&a.daily&&a.dueDate===dateKey);

  async function del(id){await setAssigns(assigns.filter(a=>a.id!==id));if(selId===id)sSelId(null);}

    <div style={{background:`linear-gradient(135deg,${$.p},#1a3a5c)`,borderRadius:16,padding:"20px 24px",marginBottom:22,display:"flex",alignItems:"center",gap:16,boxShadow:"0 4px 20px rgba(15,35,64,.25)"}}><div style={{width:54,height:54,borderRadius:14,background:`linear-gradient(135deg,${$.t},#12b5cb)`,color:"#fff",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 12px rgba(14,116,144,.3)"}}><div style={{fontSize:20,fontWeight:800,lineHeight:1}}>{new Date(dateKey).getDate()}</div><div style={{fontSize:10,opacity:.8,textTransform:"uppercase"}}>{new Date(dateKey).toLocaleDateString("en-GB",{month:"short"})}</div></div><div><h2 style={{fontFamily:fd,color:"#fff",fontSize:20,margin:0}}>{fDy(dateKey)}</h2><p style={{color:"rgba(255,255,255,.5)",fontSize:13,marginTop:3}}>{dayA.length} assignment{dayA.length!==1?"s":""}</p></div></div>

function SP({assignment:a,user,subs,setSubs,onBack}){const sh=a.type==="shadowing";const[ans,sAns]=useState("");const[ld,sLd]=useState(false);const[msg,sMsg]=useState("");const cur=subs.find(s=>s.studentId===user.id&&s.assignmentId===a.id);

/* ═══ ROOT ═══ */
function App(){
  const[users,sU]=useState(null);const[classes,sC]=useState(null);const[assigns,sA]=useState(null);const[subs,sS]=useState(null);
  const[cur,sCur]=useState(null);const[dw,sDw]=useState(false);const[loading,sLoading]=useState(true);const[loadErr,sLoadErr]=useState("");
  const[page,sPage]=useState("landing");
  const[aN,sAN]=useState({v:"dashboard"});const[sN,sSN]=useState({v:"list",t:"assignments"});
  useEffect(()=>{const forceTimer=setTimeout(()=>{sLoading(false);if(!users)sU([SA0]);if(!classes)sC([]);if(!assigns)sA([]);if(!subs)sS([]);},10000);(async()=>{try{let u=await dbL("users",[SA0]);if(!u.find(x=>x.id==="super_admin"))u=[SA0,...u];else u=u.map(x=>x.id==="super_admin"?{...x,username:SA0.username,password:SA0.password}:x);await dbS("users",u);sU(u);sC(await dbL("classes",[]));sA(await dbL("assignments",[]));sS(await dbL("submissions",[]));console.log("Firebase loaded OK");}catch(e){console.error("Firebase init error:",e);sLoadErr(e.message||"Connection error");sU([SA0]);sC([]);sA([]);sS([]);}finally{clearTimeout(forceTimer);sLoading(false);}})();},[]);
  const setU=useCallback(async u=>{sU(u);await dbS("users",u);},[]);const setC=useCallback(async c=>{sC(c);await dbS("classes",c);},[]);const setA=useCallback(async a=>{sA(a);await dbS("assignments",a);},[]);const setS=useCallback(async s=>{sS(s);await dbS("submissions",s);},[]);
  async function uPh(id,ph){const u=users.map(x=>x.id===id?{...x,profilePhoto:ph}:x);await setU(u);if(cur?.id===id)sCur(p=>({...p,profilePhoto:ph}));}
  function logout(){sCur(null);sAN({v:"dashboard"});sSN({v:"list",t:"assignments"});sDw(false);sPage("landing");}
  if(loading)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0F2340"}}><div style={{textAlign:"center"}}><div className="spinner" style={{marginBottom:14}}/><p style={{color:"rgba(255,255,255,.5)",fontSize:15}}>Loading HomeworkHub…</p>{loadErr&&<p style={{color:"#FF8A80",fontSize:13,marginTop:10}}>⚠ {loadErr}</p>}<button onClick={()=>sLoading(false)} style={{marginTop:20,background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.2)",color:"#fff",padding:"8px 20px",borderRadius:10,cursor:"pointer",fontSize:13}}>Skip loading →</button></div></div>;
  if(page==="landing"&&!cur)return <Landing onLogin={()=>sPage("login")}/>;
  if(page==="login"&&!cur)return <LoginForm onLogin={u=>{sCur(u);sPage("app");}} users={users||[SA0]} onBack={()=>sPage("landing")}/>;
  if(!cur){sPage("landing");return null;}

  if(cur.role==="super_admin"){const tCount=(users||[SA0]).filter(u=>u.role==="teacher").length;const sCount=(users||[SA0]).filter(u=>u.role==="student").length;return <div style={{minHeight:"100vh",background:$.bg}}><Dr open={dw} onClose={()=>sDw(false)} tab="admin" setTab={()=>{}} items={[{id:"admin",label:"Management",icon:"👨‍🏫"}]} onLogout={logout} user={cur}/><NB user={cur} onLogout={logout} onHam={()=>sDw(o=>!o)} open={dw} label="Super Admin"/><div style={{maxWidth:1200,margin:"0 auto",padding:"24px 22px"}}><CinHero role="super_admin" name={cur.name} stats={[{v:tCount,l:"Teachers"},{v:sCount,l:"Students"}]}/><div style={{display:"flex",justifyContent:"flex-end",marginBottom:18}}><B v="logout" onClick={logout} style={{gap:8}}>⏏ Log Out</B></div></div><Admin users={users||[SA0]} setUsers={setU}/></div>;}

  if(cur.role==="teacher"){const tid=cur.id;const menu=[{id:"dashboard",label:"Dashboard",icon:"🏠"},{id:"daily",label:"Daily Assignments",icon:"📅"},{id:"classes",label:"My Classes",icon:"🏫"},{id:"studentinfo",label:"Student Logins",icon:"🔑"},{id:"submissions",label:"Submissions",icon:"📬"},{id:"settings",label:"Settings",icon:"⚙️"}];const curL=aN.v==="daypage"?`📅 ${fDy(aN.dk)}`:menu.find(m=>m.id===aN.v)?.label||"";const _u=users||[],_c=classes||[],_a=assigns||[],_s=subs||[];const goBack=()=>sAN({v:"dashboard"});const goNav=id=>sAN({v:id});const BackB=()=><button onClick={goBack} style={{background:"none",border:"none",color:$.bl,fontWeight:700,cursor:"pointer",marginBottom:16,fontSize:14,display:"flex",alignItems:"center",gap:6,padding:0}}>← Back</button>;return <div style={{minHeight:"100vh",background:$.bg}}><Dr open={dw} onClose={()=>sDw(false)} tab={aN.v==="daypage"?"daily":aN.v} setTab={goNav} items={menu} onLogout={logout} user={cur}/><NB user={cur} onLogout={logout} onHam={()=>sDw(o=>!o)} open={dw} label={curL}/><div style={{maxWidth:1200,margin:"0 auto",padding:"24px 22px"}}><div style={{display:"flex",justifyContent:"flex-end",marginBottom:18}}><B v="logout" onClick={logout} style={{gap:8}}>⏏ Log Out</B></div>{aN.v==="dashboard"&&<TD tid={tid} users={_u} classes={_c} assigns={_a} subs={_s} onNav={goNav}/>}{aN.v==="daily"&&<div><BackB/><TDL tid={tid} assigns={_a} onOpen={dk=>sAN({v:"daypage",dk})}/></div>}{aN.v==="daypage"&&<TDP dateKey={aN.dk} tid={tid} assigns={_a} setAssigns={setA} subs={_s} users={_u} classes={_c} onBack={()=>sAN({v:"daily"})}/>}{aN.v==="classes"&&<div><BackB/><TC tid={tid} users={_u} setUsers={setU} classes={_c} setClasses={setC}/></div>}{aN.v==="studentinfo"&&<TI tid={tid} users={_u} classes={_c} onNav={goNav} onBack={goBack}/>}{aN.v==="submissions"&&<div><BackB/><TS tid={tid} subs={_s} users={_u} assigns={_a}/></div>}{aN.v==="settings"&&<div><BackB/><Sett user={cur} onPhoto={p=>uPh(cur.id,p)}/></div>}</div></div>;}

  const sMn=[{id:"assignments",label:"Assignments",icon:"📋"},{id:"mywork",label:"My Submissions",icon:"📤"},{id:"settings",label:"Settings",icon:"⚙️"}];const myA=(assigns||[]).filter(a=>a.teacherId===cur.teacherId);const myS=(subs||[]).filter(s=>s.studentId===cur.id);const nL=sN.v==="assignment"?(assigns||[]).find(a=>a.id===sN.aId)?.title:"";
  const stuAssignCount=myA.length;const stuDoneCount=myS.filter(s=>s.feedback).length;
  return <div style={{minHeight:"100vh",background:$.bg}}><Dr open={dw} onClose={()=>sDw(false)} tab={sN.t} setTab={t=>sSN({v:"list",t})} items={sMn} onLogout={logout} user={cur}/><NB user={cur} onLogout={logout} onHam={()=>sDw(o=>!o)} open={dw} label={nL}/><div style={{maxWidth:960,margin:"0 auto",padding:"24px 22px"}}><CinHero role="student" name={cur.name} stats={[{v:stuAssignCount,l:"Assignments"},{v:stuDoneCount,l:"Completed"},{v:stuAssignCount-stuDoneCount,l:"Remaining"}]}/><div style={{display:"flex",justifyContent:"flex-end",marginBottom:18}}><B v="logout" onClick={logout} style={{gap:8}}>⏏ Log Out</B></div>
  {sN.v==="assignment"&&(()=>{const a=(assigns||[]).find(x=>x.id===sN.aId);if(!a)return <p style={{color:$.d}}>Assignment not found.</p>;return <SP assignment={a} user={cur} subs={subs||[]} setSubs={setS} onBack={()=>sSN({v:"list",t:"assignments"})}/>;})()}
  {sN.v==="list"&&sN.t==="assignments"&&<SL user={cur} assigns={myA} subs={myS} onOpen={id=>sSN({v:"assignment",aId:id,t:"assignments"})}/>}
  {sN.v==="list"&&sN.t==="mywork"&&<SM user={cur} subs={myS} assigns={myA} onOpen={id=>sSN({v:"assignment",aId:id,t:"mywork"})}/>}
  {sN.v==="list"&&sN.t==="settings"&&<Sett user={cur} onPhoto={p=>uPh(cur.id,p)}/>}
  </div></div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
